name: Pump.fun Monitor - Shift 2 (6 AM - 12 PM)

on:
  schedule:
    - cron: '0 6 * * *'
      timezone: "Asia/Kolkata"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install aiohttp python-telegram-bot
      - run: python monitor.py
