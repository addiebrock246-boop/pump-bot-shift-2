name: Pump.fun Monitor Bot - Shift 2 (6 AM - 12 PM)

on:
  workflow_dispatch:               # Manual trigger
  schedule:
    - cron: '0 6 * * *'            # 6:00 AM IST
    # timezone: "Asia/Kolkata"    # Use timezone if available

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install aiohttp websockets python-telegram-bot

      - name: Run Pump.fun Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pump_monitor.py
